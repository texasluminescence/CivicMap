name: Daily ML Pipeline

on:
  schedule:
    # Runs at 2:00 AM CDT (7:00 AM UTC) every day
    - cron: '0 7 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually!

jobs:
  run-ml-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Event Tagging
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/tag_events.py

      - name: Run Embeddings Generation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python ml/generate_embeddings.py